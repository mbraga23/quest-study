<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ Quest Study — Sistema de Missões</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0a1a;--card:#12122a;--border:#2a2a4a;--text:#e0e0f0;--dim:#8888aa;
      --blue:#00d4ff;--green:#00ff88;--purple:#aa44ff;--orange:#ff8800;--red:#ff3366;--gold:#ffd700;--cyan:#00f5ff;
      --qc:#f0c040;
    }
    body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh}
    .app{min-height:100vh;background:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(170,68,255,.03) 0%,transparent 50%),var(--bg)}

    /* Auth */
    .auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .auth-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;max-width:420px;width:100%;text-align:center}
    .auth-logo{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
    .auth-sub{color:var(--dim);font-size:.85rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
    .auth-input{width:100%;padding:14px 18px;background:rgba(10,10,26,.8);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;margin-bottom:12px;outline:none;transition:border .3s}
    .auth-input:focus{border-color:var(--blue)}
    .auth-input::placeholder{color:var(--dim)}
    .auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(170,68,255,.2));border:1px solid var(--blue);border-radius:10px;color:var(--blue);font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:2px;margin-top:8px}
    .auth-btn:hover{background:linear-gradient(135deg,rgba(0,212,255,.3),rgba(170,68,255,.3));box-shadow:0 0 20px rgba(0,212,255,.2)}
    .auth-btn.secondary{border-color:var(--green);color:var(--green);margin-top:12px}
    .auth-btn.secondary:hover{box-shadow:0 0 20px rgba(0,255,136,.2)}
    .auth-error{color:var(--red);font-size:.85rem;margin-top:8px;min-height:20px}
    .auth-divider{color:var(--dim);font-size:.8rem;margin:20px 0;display:flex;align-items:center;gap:12px}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

    /* Header */
    .header{padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(18,18,42,.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
    .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .logo{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
    .logo-sub{font-size:.65rem;color:var(--dim);letter-spacing:4px;text-transform:uppercase}
    .header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .user-badge{font-size:.85rem;color:var(--dim);display:flex;align-items:center;gap:6px}
    .user-badge strong{color:var(--green)}
    .qc-badge{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(240,192,64,.15),rgba(255,136,0,.1));border:1px solid rgba(240,192,64,.4);border-radius:10px;padding:5px 12px;font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;color:var(--qc);letter-spacing:1px;text-shadow:0 0 10px rgba(240,192,64,.4)}
    .qc-badge .qc-icon{font-size:1rem}
    .btn-sm{padding:6px 14px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid}
    .btn-logout{background:rgba(255,51,102,.1);border-color:rgba(255,51,102,.3);color:var(--red)}
    .btn-logout:hover{background:rgba(255,51,102,.2)}

    /* Nav */
    .nav-tabs{display:flex;gap:4px;background:rgba(10,10,26,.6);padding:4px;border-radius:12px;border:1px solid var(--border)}
    .nav-tab{padding:8px 18px;border:none;background:transparent;color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;border-radius:8px;transition:all .2s;letter-spacing:1px;position:relative}
    .nav-tab:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .nav-tab.active{background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(170,68,255,.2));color:var(--blue);box-shadow:0 0 15px rgba(0,212,255,.1)}
    .nav-tab .badge-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1.5s ease-in-out infinite}

    /* Main */
    .main{max-width:1200px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;transition:border-color .3s}
    .card:hover{border-color:rgba(0,212,255,.3)}
    .card-title{font-family:'Orbitron',monospace;font-size:.8rem;color:var(--blue);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:linear-gradient(135deg,rgba(0,212,255,.05),rgba(170,68,255,.05));border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
    .stat-value{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .stat-label{font-size:.7rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
    .streak-fire{font-size:1.3rem;display:inline-block;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

    /* XP Bar */
    .xp-bar-outer{width:100%;height:20px;background:rgba(10,10,26,.8);border-radius:10px;overflow:hidden;border:1px solid var(--border);position:relative}
    .xp-bar-inner{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
    .xp-bar-inner::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s infinite}
    @keyframes shimmer{100%{left:100%}}
    .xp-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);z-index:1}

    /* Tasks */
    .tasks-section{margin-bottom:12px}
    .tasks-section-title{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--purple);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;padding-left:4px}
    .tasks-grid{display:flex;flex-direction:column;gap:6px}
    .task-item{display:flex;align-items:center;gap:12px;padding:11px 16px;background:rgba(10,10,26,.4);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;user-select:none}
    .task-item:hover{background:rgba(0,212,255,.05);border-color:rgba(0,212,255,.3);transform:translateX(4px)}
    .task-item.checked{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.3)}
    .task-item.lightning{border-color:var(--orange);background:rgba(255,136,0,.08);animation:lightningGlow 2s ease-in-out infinite}
    @keyframes lightningGlow{0%,100%{box-shadow:0 0 10px rgba(255,136,0,.2)}50%{box-shadow:0 0 25px rgba(255,136,0,.5)}}
    .task-item.lightning.checked{border-color:var(--gold);background:rgba(255,215,0,.08)}
    .task-checkbox{width:26px;height:26px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0;font-size:.9rem;color:var(--green)}
    .task-item.checked .task-checkbox{border-color:var(--green);background:rgba(0,255,136,.2);box-shadow:0 0 10px rgba(0,255,136,.2)}
    .task-item.lightning .task-checkbox{border-color:var(--orange)}
    .task-icon{font-size:1.2rem}
    .task-label{flex:1;font-size:.95rem;font-weight:500}
    .task-time{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--cyan);background:rgba(0,245,255,.08);padding:2px 8px;border-radius:6px;white-space:nowrap;border:1px solid rgba(0,245,255,.15)}
    .task-points{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--gold);font-weight:700;white-space:nowrap}
    .task-attr{font-size:.6rem;padding:2px 6px;border-radius:4px;font-family:'Orbitron',monospace;letter-spacing:1px;font-weight:700;white-space:nowrap}
    .attr-forca{background:rgba(255,51,102,.15);color:var(--red);border:1px solid rgba(255,51,102,.3)}
    .attr-inteligencia{background:rgba(0,212,255,.15);color:var(--blue);border:1px solid rgba(0,212,255,.3)}
    .attr-disciplina{background:rgba(170,68,255,.15);color:var(--purple);border:1px solid rgba(170,68,255,.3)}
    .attr-agilidade{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
    .lightning-badge{font-size:.65rem;background:rgba(255,136,0,.2);color:var(--orange);border:1px solid rgba(255,136,0,.4);border-radius:4px;padding:2px 6px;font-family:'Orbitron',monospace;letter-spacing:1px;font-weight:700;animation:pulse 1.5s ease-in-out infinite}

    /* Attributes Panel */
    .attr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    .attr-card{border-radius:12px;padding:16px;border:1px solid}
    .attr-card.forca{background:linear-gradient(135deg,rgba(255,51,102,.08),rgba(255,51,102,.03));border-color:rgba(255,51,102,.3)}
    .attr-card.inteligencia{background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(0,212,255,.03));border-color:rgba(0,212,255,.3)}
    .attr-card.disciplina{background:linear-gradient(135deg,rgba(170,68,255,.08),rgba(170,68,255,.03));border-color:rgba(170,68,255,.3)}
    .attr-card.agilidade{background:linear-gradient(135deg,rgba(0,255,136,.08),rgba(0,255,136,.03));border-color:rgba(0,255,136,.3)}
    .attr-card-title{font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;letter-spacing:2px;display:flex;align-items:center;gap:6px;margin-bottom:10px}
    .attr-level{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;margin-bottom:4px}
    .attr-xp-text{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--dim);margin-bottom:8px}
    .attr-bar{height:8px;border-radius:4px;background:rgba(10,10,26,.6);overflow:hidden;border:1px solid rgba(255,255,255,.05)}
    .attr-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}

    /* Date Nav */
    .date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
    .date-btn{background:rgba(0,212,255,.1);border:1px solid var(--border);color:var(--blue);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .date-btn:hover{background:rgba(0,212,255,.2)}
    .date-btn:disabled{opacity:.3;cursor:not-allowed}
    .date-display{font-family:'Orbitron',monospace;font-size:.95rem;min-width:220px;text-align:center}
    .date-today{font-size:.65rem;color:var(--green);letter-spacing:2px}

    /* Achievements */
    .achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
    .achievement{background:rgba(10,10,26,.4);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;transition:all .3s}
    .achievement.unlocked{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.1)}
    .achievement.locked{opacity:.4;filter:grayscale(1)}
    .achievement-icon{font-size:1.8rem;margin-bottom:6px;display:block}
    .achievement-name{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;color:var(--gold);letter-spacing:1px}
    .achievement-desc{font-size:.7rem;color:var(--dim);margin-top:3px}

    /* Tables */
    .w-table{width:100%;border-collapse:separate;border-spacing:0 4px}
    .w-table th{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;padding:6px 10px;text-align:left}
    .w-table td{padding:8px 10px;background:rgba(10,10,26,.4);font-size:.85rem}
    .w-table tr td:first-child{border-radius:8px 0 0 8px}
    .w-table tr td:last-child{border-radius:0 8px 8px 0}
    .tier-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:16px;font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;letter-spacing:1px;border:1px solid}
    .reward-total{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;text-align:center;padding:20px;background:linear-gradient(135deg,rgba(240,192,64,.1),rgba(255,136,0,.1));border:1px solid rgba(240,192,64,.3);border-radius:16px;margin-top:12px}

    /* Calendar */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:12px}
    .cal-header{text-align:center;font-size:.6rem;color:var(--dim);letter-spacing:1px;font-family:'Orbitron',monospace;padding:4px}
    .cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;border:1px solid transparent;cursor:default}
    .cal-day.has-data{cursor:pointer}
    .cal-day.today{border-color:var(--blue)}
    .month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
    .month-label{font-family:'Orbitron',monospace;font-size:.85rem;min-width:180px;text-align:center}

    /* Editor */
    .editor-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
    .editor-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(10,10,26,.4);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;flex-wrap:wrap}
    .editor-row input,.editor-row select{background:rgba(10,10,26,.8);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none}
    .editor-row input:focus,.editor-row select:focus{border-color:var(--blue)}
    .editor-row input[type="number"]{width:60px}
    .editor-row input[type="text"]{flex:1;min-width:120px}
    .editor-row .emoji-input{width:50px;text-align:center}
    .btn-icon{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
    .btn-icon:hover{border-color:var(--blue);color:var(--blue)}
    .btn-icon.danger:hover{border-color:var(--red);color:var(--red)}
    .btn-add{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:rgba(0,212,255,.05);border:1px dashed var(--border);border-radius:10px;color:var(--blue);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;transition:all .2s;margin-top:6px}
    .btn-add:hover{background:rgba(0,212,255,.1);border-color:var(--blue)}

    /* Store */
    .store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .store-item{background:rgba(10,10,26,.6);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:8px;transition:all .3s;position:relative;overflow:hidden}
    .store-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,192,64,.03),transparent);pointer-events:none}
    .store-item:hover{border-color:rgba(240,192,64,.4);transform:translateY(-2px);box-shadow:0 8px 30px rgba(240,192,64,.08)}
    .store-item.rarity-consumivel{border-color:rgba(0,212,255,.2)}
    .store-item.rarity-consumivel:hover{border-color:rgba(0,212,255,.5)}
    .store-item.rarity-intermediario{border-color:rgba(170,68,255,.2)}
    .store-item.rarity-intermediario:hover{border-color:rgba(170,68,255,.5)}
    .store-item.rarity-lendario{border-color:rgba(255,215,0,.3);box-shadow:0 0 15px rgba(255,215,0,.05);animation:legendaryPulse 3s ease-in-out infinite}
    @keyframes legendaryPulse{0%,100%{box-shadow:0 0 15px rgba(255,215,0,.05)}50%{box-shadow:0 0 30px rgba(255,215,0,.15)}}
    .store-item-icon{font-size:2.5rem;text-align:center;margin-bottom:4px}
    .store-item-name{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:1px;color:var(--text)}
    .store-item-desc{font-size:.8rem;color:var(--dim);flex:1;line-height:1.4}
    .store-item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
    .rarity-tag{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:1px;padding:2px 8px;border-radius:4px;font-weight:700}
    .rarity-consumivel .rarity-tag{background:rgba(0,212,255,.1);color:var(--blue);border:1px solid rgba(0,212,255,.2)}
    .rarity-intermediario .rarity-tag{background:rgba(170,68,255,.1);color:var(--purple);border:1px solid rgba(170,68,255,.2)}
    .rarity-lendario .rarity-tag{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
    .store-cost{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:var(--qc);display:flex;align-items:center;gap:4px}
    .btn-buy{width:100%;padding:9px;background:linear-gradient(135deg,rgba(240,192,64,.2),rgba(255,136,0,.15));border:1px solid rgba(240,192,64,.4);border-radius:8px;color:var(--qc);font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px}
    .btn-buy:hover{background:linear-gradient(135deg,rgba(240,192,64,.35),rgba(255,136,0,.25));box-shadow:0 0 15px rgba(240,192,64,.2)}
    .btn-buy:disabled{opacity:.4;cursor:not-allowed;background:rgba(255,255,255,.05);border-color:var(--border);color:var(--dim)}
    .store-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .store-filter{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
    .store-filter.active{border-color:var(--blue);color:var(--blue);background:rgba(0,212,255,.1)}
    .inventory-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(10,10,26,.4);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
    .inventory-item-icon{font-size:1.5rem}
    .inventory-item-info{flex:1}
    .inventory-item-name{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700}
    .inventory-item-date{font-size:.7rem;color:var(--dim);margin-top:2px}
    .inventory-status{font-family:'Orbitron',monospace;font-size:.6rem;padding:3px 8px;border-radius:4px;font-weight:700}
    .status-pendente{background:rgba(255,136,0,.15);color:var(--orange);border:1px solid rgba(255,136,0,.3)}
    .status-entregue{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2)}
    .btn-deliver{padding:5px 12px;border-radius:6px;border:1px solid rgba(0,255,136,.3);background:rgba(0,255,136,.1);color:var(--green);font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-deliver:hover{background:rgba(0,255,136,.2)}
    .alert-redemption{background:linear-gradient(135deg,rgba(255,136,0,.1),rgba(255,51,102,.1));border:1px solid rgba(255,136,0,.4);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
    .alert-redemption-icon{font-size:1.5rem;animation:pulse 1.5s ease-in-out infinite}

function getLightningMission(){

  let hash=0;for(let i=0;i<today.length;i++){hash=((hash<<5)-hash)+today.charCodeAt(i);hash|=0}

  if(rand>0.10)return null; // 10% chance
  const idx=Math.abs(hash>>4)%LIGHTNING_MISSIONS.length;
  const base=LIGHTNING_MISSIONS[idx];
  return{id:`lightning_${today}`,label:base.label,icon:base.icon,attribute:base.attribute,points:15,isLightning:true};
}

function dk(d){const dt=new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}
function tasksFor(d,tasks){const dow=new Date(d).getDay();return(tasks||[]).filter(t=>!t.days||t.days.includes(dow))}
function maxPts(d,tasks){return tasksFor(d,tasks).reduce((s,t)=>s+(t.points||0),0)}
function dayPts(checks,d,tasks){
  const ts=tasksFor(d,tasks),dc=(checks||{})[dk(d)]||{};
  return ts.reduce((s,t)=>s+(dc[t.id]?t.points:0),0);
}
function getTier(pct,tiers){return(tiers||DEFAULT_TIERS).slice().reverse().find(t=>pct>=t.min)||null}
function fmt(d){const dt=new Date(d);return`${DN[dt.getDay()]}, ${dt.getDate()} de ${MN[dt.getMonth()]}`}
function countTask(checks,id){let c=0;Object.values(checks||{}).forEach(d=>{if(d[id])c++});return c}
function countCat(checks,tasks,cat){
  let c=0;const ids=(tasks||[]).filter(t=>t.category===cat).map(t=>t.id);
  Object.values(checks||{}).forEach(d=>{ids.forEach(id=>{if(d[id])c++})});return c;
}
function calcStreak(checks){
  let s=0,d=new Date();d.setHours(0,0,0,0);
  while(true){const k=dk(d),ch=checks[k];if(!ch||!Object.values(ch).some(Boolean))break;s++;d.setDate(d.getDate()-1)}
  return s;
}
function weeklyStats(checks,tasks,tiers){
  const w=[],all=Object.keys(checks||{}).sort();if(!all.length)return w;
  let c=new Date(all[0]);const dow=c.getDay();c.setDate(c.getDate()+(dow===0?-6:1-dow));
  const today=new Date();
  while(c<=today){
    let wp=0,wm=0;const ws=new Date(c);
    for(let i=0;i<7;i++){const dd=new Date(c);dd.setDate(dd.getDate()+i);if(dd>today)break;wp+=dayPts(checks,dd,tasks);wm+=maxPts(dd,tasks)}
    if(wm>0){const pct=Math.round(wp/wm*100);w.push({start:ws,pts:wp,max:wm,pct,tier:getTier(pct,tiers)})}
    c.setDate(c.getDate()+7);
  }
  return w;
}
function daysUsingApp(checks){
  const all=Object.keys(checks||{}).sort();if(!all.length)return 0;
  const first=new Date(all[0]+"T12:00:00"),now=new Date();
  return Math.floor((now-first)/(1000*60*60*24));
}
function isDiamondMonth(checks,tasks,tiers,year,month){
  const weeks=weeklyStats(checks,tasks,tiers);
  const mw=weeks.filter(w=>{return w.start.getMonth()===month&&w.start.getFullYear()===year});
  return mw.length>=4&&mw.every(w=>w.pct>=95);
}
function hasConsecutiveGold(checks,tasks,tiers,count){
  const weeks=weeklyStats(checks,tasks,tiers);let streak=0;
  for(const w of weeks){if(w.pct>=85){streak++;if(streak>=count)return true}else streak=0}
  return false;
}

  const totalPurchases=(data.inventory||[]).length;

  const conds={

    reader_10:countTask(ch,"leitura")>=10, reader_30:countTask(ch,"leitura")>=30, reader_50:countTask(ch,"leitura")>=50,
    calligraphy_10:countTask(ch,"caligrafia")>=10, calligraphy_30:countTask(ch,"caligrafia")>=30,
    house_20:countCat(ch,tasks,"casa")>=20, house_50:countCat(ch,tasks,"casa")>=50, house_100:countCat(ch,tasks,"casa")>=100,
    month_1:days>=30, month_3:days>=90, month_6:days>=180,
    diamond_week:weeklyStats(ch,tasks,tiers).some(w=>w.pct>=95),
    gold_4:hasConsecutiveGold(ch,tasks,tiers,4),
    qc_500:qc>=500, qc_1000:qc>=1000,
    first_purchase:totalPurchases>=1,
    lightning_5:lightning>=5,
  };
  let unlocked=[];
  for(const[id,met]of Object.entries(conds)){if(met&&!nw.includes(id)){nw.push(id);const a=ACHIEVEMENTS.find(x=>x.id===id);if(a)unlocked.push(a)}}
  return{achievements:nw,unlocked};
}

async function toggleTask(taskId,points,attribute,isLightning){
  const d=S.data,k=dk(S.selDate),dc={...(d.dailyChecks?.[k]||{})};
  const was=dc[taskId];dc[taskId]=!was;
  const newChecks={...d.dailyChecks,[k]:dc};
  const streak=calcStreak(newChecks),best=Math.max(d.streakBest||0,streak);

  // QC: 1 XP = 1 QC base; lightning = 2x bonus
  let qcEarned=0;
  let newQc=d.questCoins||0;
  let newAttrs={...(d.attributes||{forca:0,inteligencia:0,disciplina:0,agilidade:0})};
  let newLightningCount=d.lightningCount||0;

  if(!was){
    qcEarned=isLightning?points*2:points;
    newQc+=qcEarned;
    if(attribute&&newAttrs[attribute]!==undefined)newAttrs[attribute]=(newAttrs[attribute]||0)+points;
    if(isLightning)newLightningCount++;
  } else {
    // Un-check: remove QC and attribute XP
    qcEarned=isLightning?-(points*2):-points;
    newQc=Math.max(0,newQc+qcEarned);
    if(attribute&&newAttrs[attribute]!==undefined)newAttrs[attribute]=Math.max(0,(newAttrs[attribute]||0)-points);
    if(isLightning)newLightningCount=Math.max(0,newLightningCount-1);
  }

  const nd={...d,dailyChecks:newChecks,streakCurrent:streak,streakBest:best,questCoins:newQc,attributes:newAttrs,lightningCount:newLightningCount};
  const{achievements,unlocked}=checkAch(nd);nd.achievements=achievements;
  await saveData(nd);

  if(!was){
    showNotif(`+${points} XP  🪙 +${qcEarned} QC`,"notif-pts");
    if(isLightning)setTimeout(()=>showNotif("⚡ MISSÃO RELÂMPAGO! Bônus 2x!","notif-qc"),800);
  }
  if(unlocked.length)setTimeout(()=>showNotif(`🏆 ${unlocked[0].name} desbloqueado!`,"notif-ach"),500);
}

async function updateTask(idx,field,val){

    if(cur.includes(d))tasks[idx].days=cur.filter(x=>x!==d);
    else tasks[idx].days=[...cur,d].sort();

    tasks[idx].points=parseInt(val)||0;

  await saveData({tasks});
}

async function buyItem(itemId){
  const d=S.data;
  const item=(d.storeItems||[]).find(i=>i.id===itemId);
  if(!item)return;
  const qc=d.questCoins||0;
  if(qc<item.cost){showNotif("❌ QC insuficiente!","notif-err");return;}
  const newQc=qc-item.cost;
  const inv=JSON.parse(JSON.stringify(d.inventory||[]));
  inv.push({id:"inv_"+Date.now(),itemId:item.id,name:item.name,icon:item.icon,purchasedAt:new Date().toISOString(),delivered:false});
  const nd={...d,questCoins:newQc,inventory:inv};
  const{achievements,unlocked}=checkAch(nd);nd.achievements=achievements;
  await saveData(nd);
  showNotif(`🛒 ${item.name} resgatado!`,"notif-qc");
  if(unlocked.length)setTimeout(()=>showNotif(`🏆 ${unlocked[0].name} desbloqueado!`,"notif-ach"),500);
}

}

              <div class="inventory-item-name">${inv.name}</div>
              <div class="inventory-item-date">Resgatado em ${new Date(inv.purchasedAt).toLocaleDateString('pt-BR')}</div>
            </div>
            <button class="btn-deliver" onclick="markDelivered('${inv.id}')">✓ Entregar</button>
          </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">✅ Histórico Entregues</div>
      ${delivered.length===0?'<div style="text-align:center;padding:20px;color:var(--dim)">Nenhum entregue ainda.</div>':
        delivered.slice().reverse().map(inv=>`
          <div class="inventory-item" style="opacity:.6">
            <span class="inventory-item-icon">${inv.icon}</span>
            <div class="inventory-item-info">
              <div class="inventory-item-name">${inv.name}</div>
              <div class="inventory-item-date">${new Date(inv.purchasedAt).toLocaleDateString('pt-BR')}</div>
            </div>
            <span class="inventory-status status-entregue">✓ ENTREGUE</span>
          </div>`).join('')}
    </div>`;
}

function renderPainel(checks,tasks,tiers,attributes){
  const weeks=weeklyStats(checks,tasks,tiers);
  const cm=S.calMonth,y=cm.getFullYear(),m=cm.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0),pad=first.getDay();
  let cal='';
  for(let i=0;i<pad;i++)cal+=`<div class="cal-day" style="opacity:.1"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(y,m,d),k=dk(dt),ch=checks[k],has=ch&&Object.values(ch).some(Boolean);
    const p=has?dayPts(checks,dt,tasks):0,mx=maxPts(dt,tasks),pct=mx>0?Math.round(p/mx*100):0;
    const isT=dk(dt)===dk(new Date());
    const bg=has?(pct>=95?'rgba(0,245,255,.3)':pct>=85?'rgba(255,215,0,.3)':pct>=70?'rgba(192,192,192,.3)':pct>=50?'rgba(205,127,50,.3)':'rgba(255,51,102,.2)'):'rgba(255,255,255,.03)';
    cal+=`<div class="cal-day ${has?'has-data':''} ${isT?'today':''}" style="background:${bg};color:${has?'#fff':'var(--dim)'}" title="${has?pct+'%':''}" onclick="calClick(${y},${m},${d})">${d}</div>`;
  }

  const months={};
  weeks.forEach(w=>{const k=`${w.start.getFullYear()}-${String(w.start.getMonth()+1).padStart(2,'0')}`;if(!months[k])months[k]={weeks:[],total:0};months[k].weeks.push(w);if(w.tier)months[k].total+=w.tier.reward});

  const attrHTML=`<div class="card">
    <div class="card-title">🧬 Atributos Acumulados</div>
    <div class="attr-grid">
      ${Object.entries(ATTRIBUTES).map(([key,attr])=>{
        const xp=attributes[key]||0;
        const lvl=xpToLevel(xp),progress=xpInLevel(xp),pct=Math.round(progress/50*100);
        return`<div class="attr-card ${key}">
          <div class="attr-card-title" style="color:${attr.color}">${attr.icon} ${attr.name}</div>
          <div class="attr-level" style="color:${attr.color}">Nv. ${lvl}</div>
          <div class="attr-xp-text">${xp} XP · ${progress}/50</div>
          <div class="attr-bar"><div class="attr-bar-fill" style="width:${pct}%;background:${attr.barColor};box-shadow:0 0 8px ${attr.barColor}60"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  return`
    <div class="card"><div class="card-title">📅 Calendário</div>
      <div class="month-nav">
        <button class="date-btn" onclick="navMonth(-1)">◀</button>
        <div class="month-label">${MN[m]} ${y}</div>
        <button class="date-btn" onclick="navMonth(1)">▶</button>
      </div>
      <div class="cal-grid">${DN.map(d=>`<div class="cal-header">${d}</div>`).join('')}${cal}</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap">
        ${tiers.map(t=>`<div style="display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--dim)"><div style="width:10px;height:10px;border-radius:3px;background:${t.color};opacity:.5"></div>${t.name}</div>`).join('')}
      </div>
    </div>
    ${attrHTML}
    <div class="card"><div class="card-title">📊 Relatório Semanal</div>
      ${!weeks.length?'<div style="text-align:center;padding:20px;color:var(--dim)">Nenhum dado ainda 📈</div>':`
        <div class="table-wrapper"><table class="w-table"><thead><tr><th>Semana</th><th>XP</th><th>%</th><th>Tier</th><th>QC</th></tr></thead><tbody>
        ${weeks.slice(-8).reverse().map(w=>`<tr>
          <td>${fmt(w.start)}</td>
          <td style="font-family:'JetBrains Mono',monospace">${w.pts}/${w.max}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${w.tier?w.tier.color:'#666'}">${w.pct}%</td>
          <td>${w.tier?`<span class="tier-badge" style="color:${w.tier.color};border-color:${w.tier.color};background:${w.tier.color}15">${w.tier.name}</span>`:'—'}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--qc)">${w.tier?'🪙 '+w.tier.reward:'—'}</td>
        </tr>`).join('')}</tbody></table>`}</div>
            </div>
    <div class="card"><div class="card-title">💰 Recompensa Mensal em QC</div>
      ${!Object.keys(months).length?'<div style="text-align:center;padding:20px;color:var(--dim)">Dados aparecerão aqui 🪙</div>':
        Object.entries(months).sort(([a],[b])=>b.localeCompare(a)).slice(0,3).map(([k,mo])=>{
          const[yr,mn]=k.split('-');
          const allDiamond=mo.weeks.length>=4&&mo.weeks.every(w=>w.pct>=95);
          const monthComplete=mo.weeks.length>=4;
          return`<div style="margin-bottom:16px">
            <div style="font-family:'Orbitron',monospace;font-size:.8rem;color:var(--blue);margin-bottom:8px">${MN[parseInt(mn)-1]} ${yr}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
              ${mo.weeks.map((w,i)=>`<span class="tier-badge" style="color:${w.tier?w.tier.color:'#666'};border-color:${w.tier?w.tier.color:'#333'};background:${w.tier?w.tier.color+'15':'transparent'}">S${i+1}: ${w.pct}%${w.tier?' (🪙'+w.tier.reward+')':''}</span>`).join('')}
            </div>
            <div class="reward-total" style="color:var(--qc)">Total: 🪙 ${mo.total} QC</div>
            ${allDiamond?`<div style="margin-top:12px;padding:16px;background:linear-gradient(135deg,rgba(0,245,255,.1),rgba(170,68,255,.1));border:1px solid var(--cyan);border-radius:12px;text-align:center;animation:pulse 2s ease-in-out infinite">
              <div style="font-size:2rem;margin-bottom:4px">👑💎🏆</div>
              <div style="font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:var(--cyan);letter-spacing:2px">MÊS DIAMANTE COMPLETO!</div>
              <div style="font-size:.9rem;color:var(--gold);margin-top:6px;font-weight:700">🎁 PEDIDO ESPECIAL DESBLOQUEADO!</div>
            </div>`:monthComplete?'':`<div style="margin-top:6px;font-size:.75rem;color:var(--dim)">💎 Mês Diamante: todas as semanas precisam ser 95%+</div>`}
          </div>`;
        }).join('')}
    </div>`;
}

function calClick(y,m,d){const dt=new Date(y,m,d);if(dt<=new Date()){S.selDate=dt;S.tab='missoes';render()}}
function navMonth(dir){S.calMonth=new Date(S.calMonth.getFullYear(),S.calMonth.getMonth()+dir,1);render()}

function renderConfig(tasks,tiers,sonName,storeItems){
  const dayBtns=(task,idx)=>DN.map((n,d)=>{
    const active=(task.days||[]).includes(d);
    return`<button style="width:32px;height:28px;border-radius:6px;border:1px solid ${active?'var(--green)':'var(--border)'};background:${active?'rgba(0,255,136,.15)':'transparent'};color:${active?'var(--green)':'var(--dim)'};cursor:pointer;font-size:.7rem;font-weight:700;font-family:'JetBrains Mono',monospace" onclick="updateTask(${idx},'days','${d}')">${n.slice(0,1)}</button>`;
  }).join('');

  const attrOptions=Object.entries(ATTRIBUTES).map(([k,v])=>`<option value="${k}">${v.icon} ${v.name}</option>`).join('');

  return`
    <div class="card">
      <div class="card-title">👤 Nome do Filho</div>
      <div style="display:flex;gap:8px">
        <input class="auth-input" style="margin:0" id="son-name" value="${sonName}" placeholder="Nome do filho">
        <button class="auth-btn" style="width:auto;padding:10px 20px;margin:0" onclick="updateSonName(document.getElementById('son-name').value)">Salvar</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Gerenciar Tarefas</div>
      ${tasks.map((t,i)=>`
        <div class="editor-row">
          <input class="auth-input emoji-input" style="margin:0;width:50px;text-align:center" value="${t.icon}" onchange="updateTask(${i},'icon',this.value)">
          <input class="auth-input" style="margin:0;flex:1;min-width:120px" value="${t.label}" onchange="updateTask(${i},'label',this.value)">
          <select class="auth-input" style="margin:0;width:100px" onchange="updateTask(${i},'category',this.value)">
            ${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${t.category===k?'selected':''}>${v}</option>`).join('')}
          </select>
          <select class="auth-input" style="margin:0;width:120px" onchange="updateTask(${i},'attribute',this.value)">
            ${Object.entries(ATTRIBUTES).map(([k,v])=>`<option value="${k}" ${t.attribute===k?'selected':''}>${v.icon} ${v.name}</option>`).join('')}
          </select>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:.75rem;color:var(--dim)">XP:</span>
            <input class="auth-input" type="number" style="margin:0;width:55px" value="${t.points}" onchange="updateTask(${i},'points',this.value)">
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:.75rem;color:var(--dim)">⏰</span>
            <input class="auth-input" style="margin:0;width:110px;font-size:.8rem" value="${t.time||''}" placeholder="Horário" onchange="updateTask(${i},'time',this.value)">
          </div>
          <div style="display:flex;gap:3px">${dayBtns(t,i)}</div>
          <button class="btn-icon danger" onclick="if(confirm('Remover ${t.label}?'))removeTask(${i})">✕</button>
        </div>
      `).join('')}
      <div class="btn-add" onclick="addTask()">+ Adicionar Tarefa</div>
    </div>

    <div class="card">
      <div class="card-title">🏅 Tiers e Recompensas (em QC)</div>
      ${tiers.map((t,i)=>`
        <div class="editor-row">
          <div style="width:16px;height:16px;border-radius:4px;background:${t.color};flex-shrink:0"></div>
          <input class="auth-input" style="margin:0;width:100px" value="${t.name}" onchange="updateTier(${i},'name',this.value)">
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:.75rem;color:var(--dim)">Min:</span>
            <input class="auth-input" type="number" style="margin:0;width:55px" value="${t.min}" onchange="updateTier(${i},'min',this.value)">
            <span style="font-size:.75rem;color:var(--dim)">%</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:.75rem;color:var(--dim)">🪙 QC:</span>
            <input class="auth-input" type="number" style="margin:0;width:65px" value="${t.reward}" onchange="updateTier(${i},'reward',this.value)">
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:.75rem;color:var(--dim)">Cor:</span>
            <input type="color" value="${t.color}" style="width:32px;height:28px;border:none;background:transparent;cursor:pointer" onchange="updateTier(${i},'color',this.value)">
          </div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="border-color:rgba(240,192,64,.2)">
      <div class="card-title" style="color:var(--qc)">🛒 Gerenciar Loja</div>
      ${storeItems.map((item,i)=>`
        <div class="editor-row">
          <input class="auth-input emoji-input" style="margin:0;width:50px;text-align:center" value="${item.icon}" onchange="updateStoreItem(${i},'icon',this.value)">
          <input class="auth-input" style="margin:0;flex:1;min-width:100px" value="${item.name}" placeholder="Nome" onchange="updateStoreItem(${i},'name',this.value)">
          <input class="auth-input" style="margin:0;flex:2;min-width:150px;font-size:.8rem" value="${item.desc}" placeholder="Descrição" onchange="updateStoreItem(${i},'desc',this.value)">
          <select class="auth-input" style="margin:0;width:130px" onchange="updateStoreItem(${i},'category',this.value)">
            <option value="consumivel" ${item.category==='consumivel'?'selected':''}>🔵 Consumível</option>
            <option value="intermediario" ${item.category==='intermediario'?'selected':''}>🟣 Intermediário</option>
            <option value="lendario" ${item.category==='lendario'?'selected':''}>🌟 Lendário</option>
          </select>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:.75rem;color:var(--dim)">🪙</span>
            <input class="auth-input" type="number" style="margin:0;width:65px" value="${item.cost}" onchange="updateStoreItem(${i},'cost',this.value)">
          </div>
          <button class="btn-icon danger" onclick="if(confirm('Remover ${item.name}?'))removeStoreItem(${i})">✕</button>
        </div>
      `).join('')}
      <div class="btn-add" onclick="addStoreItem()">+ Adicionar Item à Loja</div>
    </div>

    <div class="card" style="border-color:rgba(255,51,102,.2)">
      <div class="card-title" style="color:var(--red)">⚠️ Zona de Perigo</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button style="background:rgba(255,136,0,.1);border:1px solid rgba(255,136,0,.3);color:var(--orange);padding:10px 24px;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600" onclick="if(confirm('⚠️ Isso vai zerar XP, streaks, conquistas, QC, atributos e checks.\\nTarefas, tiers e loja são mantidos.\\n\\nTem certeza?')){resetProgress()}">🔄 Resetar Progresso</button>
        <button style="background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.3);color:var(--red);padding:10px 24px;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600" onclick="if(confirm('⚠️ ATENÇÃO: Isso vai apagar TUDO!\\nTem certeza MESMO?')){saveData(defaultData())}">🗑️ Resetar Tudo</button>
      </div>
      <div style="margin-top:10px;font-size:.75rem;color:var(--dim)">
        <strong style="color:var(--orange)">🔄 Progresso:</strong> Zera XP, QC, streaks, conquistas, atributos. Mantém tarefas, tiers e loja.<br>
        <strong style="color:var(--red)">🗑️ Tudo:</strong> Volta ao padrão original completo.
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
